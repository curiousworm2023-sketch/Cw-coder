<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="PICPIO — free PIC microcontroller IDE for VS Code">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#f27f0c" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#f27f0c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#1e1e1e"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- original PICPIO chip icon, scaled (source viewBox 0 0 24 24, x10, offset) -->
  <g transform="translate(150,175) scale(11.3)">
    <rect x="6" y="4" width="12" height="16" rx="1" fill="#1a1a1a" stroke="#f27f0c" stroke-width="1.2"/>
    <g stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round">
      <line x1="6" y1="8"  x2="3" y2="8"/>
      <line x1="6" y1="11" x2="3" y2="11"/>
      <line x1="6" y1="14" x2="3" y2="14"/>
      <line x1="6" y1="17" x2="3" y2="17"/>
      <line x1="18" y1="8"  x2="21" y2="8"/>
      <line x1="18" y1="11" x2="21" y2="11"/>
      <line x1="18" y1="14" x2="21" y2="14"/>
      <line x1="18" y1="17" x2="21" y2="17"/>
    </g>
    <circle cx="7.5" cy="5.5" r="0.8" fill="#f27f0c"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="470" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="110" font-weight="800" letter-spacing="4" fill="#f27f0c">PICPIO</text>
  <text x="473" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="600" fill="#ffffff">The free PIC microcontroller IDE</text>
  <text x="473" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="600" fill="#cccccc">for VS Code.</text>

  <!-- install pill -->
  <rect x="473" y="440" width="560" height="64" rx="10" fill="#181818" stroke="#3e3e42"/>
  <text x="497" y="481" font-family="Cascadia Code, Consolas, monospace" font-size="26" fill="#e2b340">iex (irm https://picpio.in/install.ps1)</text>

  <text x="473" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#888888">picpio.in &#183; built by CURIOUS WORM</text>
</svg>
