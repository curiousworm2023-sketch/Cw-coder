  <!-- Left pins -->
  <line x1="6" y1="8"  x2="3" y2="8"  stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="11" x2="3" y2="11" stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="14" x2="3" y2="14" stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="17" x2="3" y2="17" stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right pins -->
  <line x1="18" y1="8"  x2="21" y2="8"  stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="11" x2="21" y2="11" stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="14" x2="21" y2="14" stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="17" x2="21" y2="17" stroke="#f27f0c" stroke-width="1.2" stroke-linecap="round"/>
